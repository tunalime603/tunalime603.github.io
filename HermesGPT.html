      function generateSentence(length = 5) {
          let sentence = [];
          for (let i = 0; i < length; i++) {
              const randomIndex = Math.floor(Math.random() * wordList.length);
              sentence.push(wordList[randomIndex]);
          }
          return sentence.join(" ");
      }
      function generateSmartSentence(length = 5) {
          let sentence = [];
          let lastWord = null;

          for (let i = 0; i < length; i++) {
              let choices = [...wordList];

              if (lastWord && memory[lastWord]) {
                  choices = choices.concat(memory[lastWord]);
              }

              const randomIndex = Math.floor(Math.random() * choices.length);
              const word = choices[randomIndex];
              
              sentence.push(word);

              if (lastWord) {
                  if (!memory[lastWord]) memory[lastWord] = [];
                  memory[lastWord].push(word);
              }

              lastWord = word;
          }

          return sentence.join(" ");
      }
      function giveFeedback(sentence, score) {
          const words = sentence.split(" ");
          for (let i = 0; i < words.length - 1; i++) {
              const pairKey = words[i];
              if (!memory[pairKey]) memory[pairKey] = [];
              // Add the next word multiple times if score is high
              for (let j = 0; j < score; j++) {
                  memory[pairKey].push(words[i + 1]);
              }
          }
      }
      function getPrescript() {
        const prescript = generateSmartSentence(10);
        const container = document.getElementById("prescript");
        container.innerHTML = "_" + prescript + "._";
